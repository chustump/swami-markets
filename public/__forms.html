<!DOCTYPE html>
<html>
  <head>
    <title>Netlify Forms Proxy</title>
  </head>
  <body>
    <!-- A hidden static form so Netlify build bots can discover the waitlist architecture -->
    <form name="waitlist" netlify netlify-honeypot="bot-field" hidden>
      <input type="email" name="email" />
    </form>
  </body>
</html>
